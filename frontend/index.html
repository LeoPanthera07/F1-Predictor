<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F1 Race Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5rem;
      color: #e10600;
      letter-spacing: 2px;
    }

    header p {
      color: #888;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    select, input {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 1rem;
      margin-bottom: 20px;
      appearance: none;
    }

    select:focus, input:focus {
      outline: none;
      border-color: #e10600;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #e10600;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    button:hover { background: #ff2010; }
    button:disabled { background: #555; cursor: not-allowed; }

    #result {
      margin-top: 28px;
      display: none;
    }

    #result h2 {
      font-size: 1rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .podium {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .podium-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .podium-item.first  { border-left: 4px solid #FFD700; }
    .podium-item.second { border-left: 4px solid #C0C0C0; }
    .podium-item.third  { border-left: 4px solid #CD7F32; }

    .rank {
      font-size: 1.4rem;
      font-weight: 700;
      width: 30px;
      text-align: center;
      color: #e10600;
    }

    .driver-name { font-size: 1rem; font-weight: 600; }
    .driver-meta { font-size: 0.8rem; color: #888; margin-top: 2px; }

    .prob {
      margin-left: auto;
      font-size: 0.9rem;
      color: #aaa;
      background: #1e1e1e;
      padding: 4px 10px;
      border-radius: 20px;
    }

    #error-msg {
      display: none;
      margin-top: 16px;
      background: #2a0000;
      border: 1px solid #e10600;
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .loader {
      display: none;
      text-align: center;
      margin-top: 20px;
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🏎️ F1 PREDICTOR</h1>
    <p>Predict race outcomes using machine learning</p>
  </header>

  <div class="card">
    <label for="circuit">Circuit</label>
    <select id="circuit">
      <option value="">Loading circuits...</option>
    </select>

    <label for="driver">Driver</label>
    <select id="driver">
      <option value="">Loading drivers...</option>
    </select>

    <label for="grid">Grid Position</label>
    <input type="number" id="grid" min="1" max="20" value="1" placeholder="e.g. 1" />

    <button id="predict-btn" onclick="predict()">PREDICT</button>

    <div class="loader" id="loader">⏳ Predicting...</div>
    <div id="error-msg"></div>

    <div id="result">
      <h2>🏁 Predicted Top 3</h2>
      <div class="podium" id="podium"></div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";

    async function loadDropdowns() {
      try {
        const [cRes, dRes] = await Promise.all([
          fetch(`${API}/circuits`),
          fetch(`${API}/drivers`)
        ]);
        const circuits = await cRes.json();
        const drivers  = await dRes.json();

        const cSel = document.getElementById("circuit");
        const dSel = document.getElementById("driver");

        cSel.innerHTML = circuits.map(c =>
          `<option value="${c.circuitId}">${c.name} (${c.country})</option>`
        ).join("");

        dSel.innerHTML = drivers.map(d =>
          `<option value="${d.driverId}">${d.forename} ${d.surname}</option>`
        ).join("");

      } catch(e) {
        document.getElementById("circuit").innerHTML = `<option>Failed to load</option>`;
        document.getElementById("driver").innerHTML  = `<option>Failed to load</option>`;
        showError("Cannot reach backend. Make sure uvicorn is running on port 8000.");
      }
    }

    async function predict() {
      const circuitId = document.getElementById("circuit").value;
      const driverId  = document.getElementById("driver").value;
      const grid      = parseInt(document.getElementById("grid").value);

      if (!circuitId || !driverId || isNaN(grid)) {
        showError("Please fill in all fields.");
        return;
      }

      document.getElementById("predict-btn").disabled = true;
      document.getElementById("loader").style.display = "block";
      document.getElementById("result").style.display = "none";
      document.getElementById("error-msg").style.display = "none";

      try {
        const res = await fetch(`${API}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ circuitId, driverId, grid })
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        showResult(data);

      } catch(e) {
        showError("Prediction failed: " + e.message);
      } finally {
        document.getElementById("predict-btn").disabled = false;
        document.getElementById("loader").style.display = "none";
      }
    }

    function showResult(data) {
      const podium = document.getElementById("podium");
      const classes = ["first", "second", "third"];
      const medals  = ["🥇", "🥈", "🥉"];

      // Support both array response or { predictions: [...] }
      const preds = Array.isArray(data) ? data : (data.predictions || data.top3 || [data]);

      podium.innerHTML = preds.slice(0, 3).map((p, i) => `
        <div class="podium-item ${classes[i] || ''}">
          <div class="rank">${medals[i] || (i+1)}</div>
          <div>
            <div class="driver-name">${p.driver || p.name || p.driverName || "Driver " + (i+1)}</div>
            <div class="driver-meta">${p.constructor || p.team || ""}</div>
          </div>
          ${p.probability !== undefined
            ? `<div class="prob">${(p.probability * 100).toFixed(1)}%</div>`
            : p.predicted_position !== undefined
            ? `<div class="prob">P${p.predicted_position}</div>`
            : ""}
        </div>
      `).join("");

      document.getElementById("result").style.display = "block";
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
    }

    loadDropdowns();
  </script>

</body>
</html>
